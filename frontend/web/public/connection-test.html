<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafeFlow Connection Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 24px;
      line-height: 1.4;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 20px;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    input {
      padding: 8px;
      min-width: 260px;
      font-size: 14px;
    }
    button {
      padding: 8px 12px;
      border: 1px solid #bbb;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
    }
    #log {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
      height: 380px;
      overflow: auto;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }
    .hint { color: #555; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <h1>SafeFlow Frontend-Backend Connection Test</h1>
  <div class="hint">The default backend address is <code>http://localhost:8080</code>. Start the backend first.</div>

  <div class="row">
    <input id="httpBase" value="http://localhost:8080" />
    <input id="wsBase" value="ws://localhost:8080" />
    <button id="connectWs">Connect WS</button>
    <button id="closeWs">Disconnect WS</button>
  </div>

  <div class="row">
    <button id="testPerception">Test /mock-risk</button>
    <button id="testIncident">Test /mock-incident</button>
    <button id="testRoute">Test /route</button>
    <button id="clearLog">Clear Logs</button>
  </div>

  <div id="log"></div>

  <script>
    let ws = null;

    const $ = (id) => document.getElementById(id);
    const logEl = $("log");

    function log(title, payload) {
      const time = new Date().toISOString();
      const body = payload === undefined ? "" : "\n" + JSON.stringify(payload, null, 2);
      logEl.textContent += `[${time}] ${title}${body}\n\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function postJson(path, body) {
      const base = $("httpBase").value.replace(/\/+$/, "");
      const url = `${base}${path}`;
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      let json = null;
      try {
        json = await res.json();
      } catch (_) {}
      return { ok: res.ok, status: res.status, json };
    }

    function connectSocketIo() {
      const wsBase = $("wsBase").value.trim();
      if (ws) ws.close();

      const socketIoUrl = `${wsBase.replace(/\/+$/, "")}/socket.io/?EIO=4&transport=websocket`;
      ws = new WebSocket(socketIoUrl);

      ws.onopen = () => {
        log("WS connected", { socketIoUrl });
      };

      ws.onclose = () => log("WS disconnected");
      ws.onerror = () => log("WS error");
      ws.onmessage = (event) => {
        try {
          const raw = String(event.data);
          if (raw === "2") {
            ws.send("3");
            return;
          }
          if (raw.startsWith("0")) {
            ws.send("40");
            return;
          }
          if (raw.startsWith("42")) {
            const payload = JSON.parse(raw.slice(2));
            const [name, data] = payload;
            log(`Socket event: ${name}`, data);
            return;
          }
          log("Socket raw message", raw);
        } catch {
          log("WS raw message received", event.data);
        }
      };
    }

    $("connectWs").onclick = connectSocketIo;

    $("closeWs").onclick = () => {
      if (ws) ws.close();
      ws = null;
    };

    $("testPerception").onclick = async () => {
      const payload = {
        zoneId: "AZ1",
        risk: 0.67
      };
      log("Request /mock-risk", payload);
      try {
        const result = await postJson("/mock-risk", payload);
        log("Response /mock-risk", result);
      } catch (e) {
        log("Request /mock-risk failed", { error: String(e) });
      }
    };

    $("testIncident").onclick = async () => {
      const payload = {
        incidentId: "INC_TEST_1",
        ts: Date.now(),
        mapId: "mall_demo_v1",
        type: "blocked_corridor",
        severity: "warn",
        loc: { zoneId: "Z2" },
        routingImpact: { hazardPenalty: 0.2, affectedRoutingZoneIds: ["Z2"] },
        status: "open"
      };
      log("Request /mock-incident", payload);
      try {
        const result = await postJson("/mock-incident", payload);
        log("Response /mock-incident", result);
      } catch (e) {
        log("Request /mock-incident failed", { error: String(e) });
      }
    };

    $("testRoute").onclick = async () => {
      const payload = {
        userId: "U_TEST_1",
        currentNodeId: "N1",
        destinationNodeId: "EXIT"
      };
      log("Request /route", payload);
      try {
        const result = await postJson("/route", payload);
        log("Response /route", result);
      } catch (e) {
        log("Request /route failed", { error: String(e) });
      }
    };

    $("clearLog").onclick = () => {
      logEl.textContent = "";
    };

    log("Test page loaded");
  </script>
</body>
</html>
